name: Update Transit Feeds

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Refresh GTFS snapshots
        run: npm run update-transit
        env:
          TRANSIT_511_API_KEY: ${{ secrets.TRANSIT_511_API_KEY }}
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No schedule changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: refresh transit feeds"
          git push

      # If any step above failed, open (or bump) a GitHub issue so the
      # repo owner gets an email notification. Issues persist past the
      # Actions log retention window.
      - name: Report failure as issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Transit feed refresh failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled **Update Transit Feeds** workflow failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              ``,
              `Likely causes: upstream 511 GTFS format change, API key expired, or sanity-floor check tripped (see the "Refresh GTFS snapshots" step).`,
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "transit-refresh",
            });
            const match = existing.data.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["transit-refresh", "automated"],
              });
            }
