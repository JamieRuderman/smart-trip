# Parallel Cloudflare deployment of the SMART trip web app, running ALONGSIDE the
# existing Vercel deploy to validate Cloudflare hosting before any backend
# migration. Serves the built Vite SPA (repo-root ./dist) as static assets with
# SPA fallback, and the Worker in src/index.ts proxies /api/* to the live Vercel
# backend so the app is fully functional with NO backend rewrite yet.
#
# Build the SPA first (`npm run build` from the repo root), then from this dir:
#   npx wrangler deploy
name = "smart-trip-web"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[assets]
# Resolved relative to this config file → repo-root ./dist.
directory = "../../dist"
binding = "ASSETS"
# Client-routed paths (e.g. /trip/123) that match no file fall back to
# index.html, mirroring the Vercel SPA rewrite in vercel.json.
not_found_handling = "single-page-application"
# Invoke the Worker FIRST for /api/* so the proxy runs instead of the SPA
# fallback swallowing it; everything else is served straight from assets.
run_worker_first = ["/api/*"]

[vars]
# Where un-migrated /api/* is proxied: the live Vercel backend. The DO also reads
# the trip-updates feed from here (GET /api/gtfsrt/tripupdates). Drop routes from
# the proxy as they move to native Workers; remove once fully migrated.
API_ORIGIN = "https://smarttraintrip.com"
# APNs topic identifiers (not secret — already in docs). The .p8 KEY_ID + PRIVATE
# KEY are SECRETS, set out-of-band (never committed):
#   npx wrangler secret put APNS_KEY_ID
#   npx wrangler secret put APNS_PRIVATE_KEY
APNS_APP_ID = "smart.trip"
APNS_TEAM_ID = "6YH3537ZY9"

# Per-activity Live Activity Durable Object — drives exact-time push transitions
# via the Alarms API (the native replacement for the Vercel poll-cron).
[[durable_objects.bindings]]
name = "TRIP_ACTIVITY"
class_name = "TripActivityDO"

# SQLite-backed DO (free-plan compatible).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["TripActivityDO"]
