# Cloudflare Workers config for the SMART trip web app + the public Live
# Activity routes (the Durable Object itself lives in workers/liveactivity/).
# Lives at the REPO ROOT so Cloudflare Workers Builds (CI) finds it with the
# default `wrangler deploy` / `wrangler versions upload` command. The Worker
# source is under workers/web/; build the SPA first (`npm run build` → ./dist),
# then deploy from the repo root:  npx wrangler deploy
name = "smart-trip-web"
main = "workers/web/src/index.ts"
compatibility_date = "2025-01-01"
# nodejs_compat so the gtfs-realtime-bindings (protobufjs) decoder runs on the
# Workers runtime when reading the 511 feed natively.
compatibility_flags = ["nodejs_compat"]

# Production Worker routes/domains.
#  - smarttraintrip.com/*: the apex production site. A zone route, so it activates
#    only when the apex DNS record is Proxied (orange) and is inert while
#    DNS-only (grey).
# (The app.smarttraintrip.com test-scaffolding custom domain was retired — it was
#  unused: only a local .env pointer referenced it, now repointed to the apex.)
routes = [
  { pattern = "smarttraintrip.com/*", zone_name = "smarttraintrip.com" },
]
# Adding `routes` otherwise disables these by default. Keep workers.dev alive for
# direct Worker smoke tests.
workers_dev = true
preview_urls = true

[assets]
directory = "./dist"
binding = "ASSETS"
# Client-routed paths (e.g. /trip/123) that match no file fall back to
# index.html, mirroring the Vercel SPA rewrite in vercel.json.
not_found_handling = "single-page-application"
# Invoke the Worker FIRST for /api/* so the DO routes + proxy run instead of the
# SPA fallback swallowing them; everything else is served straight from assets.
# /data/schedules.json is also worker-first: it's a real static asset, so without
# this the assets runtime serves it directly and bypasses the Worker's CORS branch
# — the iOS app (capacitor://localhost) then can't read it cross-origin.
run_worker_first = ["/api/*", "/data/schedules.json"]

# Per-activity Live Activity Durable Object — drives exact-time push transitions
# via the Alarms API (the native replacement for the Vercel poll-cron). The class
# is IMPLEMENTED by the separate smart-trip-liveactivity Worker
# (workers/liveactivity/) and reached from here via this cross-script binding:
# Cloudflare generates no Preview URLs for Workers that implement a Durable
# Object, so keeping this Worker DO-free is what makes per-version preview
# builds possible. The APNs vars + secrets live on that Worker now, not here.
[[durable_objects.bindings]]
name = "TRIP_ACTIVITY"
class_name = "TripActivityDO"
script_name = "smart-trip-liveactivity"

# Per-IP rate limit for the PUBLIC /api/liveactivity/* mutation routes
# (register/token/deregister). These are accountless by design, so without a
# limiter anyone can spin up unbounded Durable Objects (each with a self-
# scheduling 511 poll alarm). The Worker enforces this binding when present and
# is a no-op when it's absent (local dev / preview), so it's safe to enable once
# you've confirmed Workers Rate Limiting is available on the account. Uncomment:
# [[ratelimit]]
# name = "LIVEACTIVITY_RATE_LIMIT"
# namespace_id = "1001"          # any unique id within the account
# simple = { limit = 60, period = 60 }   # 60 requests / 60s per client IP

# GTFS-RT feeds are cached in the edge Cache API (caches.default) — free, with
# no per-day write limit — so the Worker needs no KV binding for the cache. (KV's
# free-tier 1,000-writes/day cap was too low for a per-refresh cache and took the
# feeds down.) See workers/web/src/lib/gtfsrt.ts.

# Preview builds: Workers Builds' default non-production deploy command
# (`npx wrangler versions upload`) uploads a version of THIS Worker, and
# Cloudflare generates a Preview URL for it because the Worker no longer
# implements a Durable Object (the class moved to smart-trip-liveactivity).
# Note that Workers Builds forces every build onto the connected Worker via
# WRANGLER_CI_OVERRIDE_NAME, so `[env.*]` name overrides can never target a
# different Worker from CI — the retired smart-trip-web-preview /
# `--env preview` scaffolding was unreachable for that reason.
